name: Run Job Bot Automation

on:
  schedule:
    - cron: '0 11 * * *'
    - cron: '0 16 * * *'
    - cron: '0 22 * * *'
  workflow_dispatch: 

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias y ejecutar
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          # Forzamos a Python a buscar en el directorio actual
          PYTHONPATH: ${{ github.workspace }}
        run: |
          # 1. Instalar dependencias del sistema
          sudo apt-get update
          sudo apt-get install -y libnss3 libnspr4 libgbm1 libasound2t64 libatk-bridge2.0-0 libgtk-3-0 libx11-xcb1 libxcomposite1 libxdamage1 libxrandr2 libxshmfence1 libxkbcommon0
          
          # 2. Obtener la ruta exacta del ejecutable de Python
          PYTHON_PATH=$(which python)
          echo "Usando Python en: $PYTHON_PATH"
          
          # 3. Instalar librerías usando la ruta exacta para asegurar consistencia
          $PYTHON_PATH -m pip install --upgrade pip
          $PYTHON_PATH -m pip install jobspy supabase openai python-dotenv playwright
          $PYTHON_PATH -m playwright install chromium
          
          # 4. Ejecutar el script usando el mismo ejecutable
          $PYTHON_PATH main.py