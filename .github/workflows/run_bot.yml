name: Run Job Bot Automation

on:
  schedule:
    - cron: '0 11 * * *'
    - cron: '0 16 * * *'
    - cron: '0 22 * * *'
  workflow_dispatch: 

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias y ejecutar
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          # PYTHONDONTWRITEBYTECODE evita conflictos con archivos .pyc corruptos
          PYTHONDONTWRITEBYTECODE: 1
          # PYTHONPATH asegura que Python busque en la raíz antes que en ningún otro lado
          PYTHONPATH: ${{ github.workspace }}
        run: |
          # 1. Instalar dependencias del sistema para Playwright
          sudo apt-get update
          sudo apt-get install -y libnss3 libnspr4 libgbm1 libasound2t64 libatk-bridge2.0-0 libgtk-3-0 libx11-xcb1 libxcomposite1 libxdamage1 libxrandr2 libxshmfence1 libxkbcommon0
          
          # 2. Instalación limpia de paquetes
          python -m pip install --upgrade pip
          pip install jobspy supabase openai python-dotenv playwright
          playwright install chromium
          
          # 3. Borrar cualquier rastro de archivos compilados viejos que puedan estar causando conflictos
          find . -name "*.pyc" -delete
          find . -name "__pycache__" -delete
          
          # 4. Ejecución del bot como módulo
          # Esto evita que Python ignore paquetes instalados al detectar estructuras de carpetas locales
          python -m main