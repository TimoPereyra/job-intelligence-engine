name: Run Job Bot Automation

on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch: 

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar y Ejecutar
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          # Inyectamos la carpeta local 'deps' en el PYTHONPATH
          PYTHONPATH: ${{ github.workspace }}/deps
        run: |
          # 1. Instalar dependencias en una carpeta local llamada 'deps'
          mkdir -p deps
          pip install --target=${{ github.workspace }}/deps jobspy supabase openai python-dotenv playwright
          
          # 2. Instalar dependencias del sistema (necesarias para playwright)
          sudo apt-get update
          sudo apt-get install -y libnss3 libnspr4 libgbm1 libasound2t64 libatk-bridge2.0-0 libgtk-3-0 libx11-xcb1 libxcomposite1 libxdamage1 libxrandr2 libxshmfence1 libxkbcommon0
          playwright install chromium
          
          # 3. Ejecutar
          python main.py