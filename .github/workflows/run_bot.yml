name: Run Job Bot Automation

on:
  schedule:
    - cron: '0 11 * * *'
    - cron: '0 16 * * *'
    - cron: '0 22 * * *'
  workflow_dispatch: 

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias y ejecutar
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          # Esta variable es vital para que Python encuentre tus subcarpetas
          PYTHONPATH: ${{ github.workspace }}
        run: |
          # 1. Instalar dependencias del sistema necesarias para Playwright
          sudo apt-get update
          sudo apt-get install -y libnss3 libnspr4 libgbm1 libasound2t64 libatk-bridge2.0-0 libgtk-3-0 libx11-xcb1 libxcomposite1 libxdamage1 libxrandr2 libxshmfence1 libxkbcommon0
          
          # 2. Instalar librerías usando el módulo -m para asegurar que van al mismo Python
          python -m pip install --upgrade pip
          python -m pip install jobspy supabase openai python-dotenv playwright
          
          # 3. Instalar los binarios de navegador que usa jobspy
          python -m playwright install chromium
          
          # 4. Verificar qué ve Python ANTES de ejecutar
          echo "Verificando instalación:"
          python -c "import jobspy; print('jobspy importado correctamente')"
          
          # 5. Ejecutar tu script
          python main.py