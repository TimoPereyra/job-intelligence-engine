name: Run Job Bot Automation

on:
  schedule:
    - cron: '0 11 * * *'
    - cron: '0 16 * * *'
    - cron: '0 22 * * *'
  workflow_dispatch: 

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias del sistema
        run: |
          sudo apt-get update
          # Usamos libasound2t64 para compatibilidad con Ubuntu 24.04
          sudo apt-get install -y libnss3 libnspr4 libgbm1 libasound2t64 libatk-bridge2.0-0 libgtk-3-0 libx11-xcb1 libxcomposite1 libxdamage1 libxrandr2 libxshmfence1 libxkbcommon0

      - name: Instalar librerías de Python
        run: |
          python -m pip install --upgrade pip
          pip install jobspy supabase openai python-dotenv playwright
          # Instalamos los binarios del navegador que necesita jobspy
          playwright install chromium

      - name: Ejecutar el bot
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          # PYTHONPATH asegura que Python encuentre tus carpetas internas (adapters, core, etc)
          PYTHONPATH: ${{ github.workspace }}
        run: python main.py