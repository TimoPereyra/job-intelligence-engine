name: Run Job Bot Automation

on:
  schedule:
    # 09:00 UTC y 21:00 UTC (Equivale a 06:00 y 18:00 hora Argentina)
    - cron: '0 9 * * *'
    - cron: '0 21 * * *'
  
  # Modificamos esta parte para agregar el input que va a mandar Postman/Vercel
  workflow_dispatch:
    inputs:
      job_url:
        description: 'URL de la oferta de trabajo a procesar individualmente'
        required: false # Lo dejamos en false para que el cron diario siga corriendo sin que nadie le pase una URL a mano
        default: ''

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: |
          sudo apt-get update
          sudo apt-get install -y libnss3 libnspr4 libgbm1 libasound2t64 libatk-bridge2.0-0 libgtk-3-0 libx11-xcb1 libxcomposite1 libxdamage1 libxrandr2 libxshmfence1 libxkbcommon0
          
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m playwright install chromium

      - name: Ejecutar Bot
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PYTHONPATH: ${{ github.workspace }}
        run: |
          # Le pasamos el parámetro al script de Python. 
          # Si viene de Postman, le pasa la URL. Si corre por el cron diario, va a ir vacío y tu Python sabrá qué hacer.
          python main.py "${{ github.event.inputs.job_url }}"