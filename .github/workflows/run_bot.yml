name: Run Job Bot Automation

on:
  schedule:
    - cron: '0 11 * * *'
    - cron: '0 16 * * *'
    - cron: '0 22 * * *'
  workflow_dispatch: 

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias y ejecutar
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          # 1. Instalar dependencias
          sudo apt-get update
          sudo apt-get install -y libnss3 libnspr4 libgbm1 libasound2t64 libatk-bridge2.0-0 libgtk-3-0 libx11-xcb1 libxcomposite1 libxdamage1 libxrandr2 libxshmfence1 libxkbcommon0
          python -m pip install --upgrade pip
          pip install jobspy supabase openai python-dotenv playwright
          playwright install chromium
          
          # 2. Localizar la ruta de las librerías instaladas
          # Esto encuentra dónde está guardado jobspy realmente
          SITE_PACKAGES=$(python -c "import site; print(site.getsitepackages()[0])")
          echo "Ruta de librerías: $SITE_PACKAGES"
          
          # 3. Ejecutar forzando el PYTHONPATH a esa ruta
          PYTHONPATH=$SITE_PACKAGES:${{ github.workspace }} python -m main