name: Run Job Bot Automation

on:
  schedule:
    - cron: '0 11 * * *'
    - cron: '0 16 * * *'
    - cron: '0 22 * * *'
  workflow_dispatch: 

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias y ejecutar
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          # Forzamos a Python a incluir el directorio actual y las librerías de usuario
          PYTHONPATH: ${{ github.workspace }}:/home/runner/.local/lib/python3.10/site-packages
        run: |
          # 1. Instalar dependencias del sistema necesarias para Playwright
          sudo apt-get update
          sudo apt-get install -y libnss3 libnspr4 libgbm1 libasound2t64 libatk-bridge2.0-0 libgtk-3-0 libx11-xcb1 libxcomposite1 libxdamage1 libxrandr2 libxshmfence1 libxkbcommon0
          
          # 2. Instalar dependencias desde requirements.txt en el directorio de usuario
          python -m pip install --upgrade pip
          python -m pip install --user -r requirements.txt
          python -m playwright install chromium
          
          # 3. Depuración: Mostrar dónde está buscando Python antes de ejecutar
          echo "--- DEPURACIÓN DE RUTAS ---"
          python -c "import sys; print(sys.path)"
          python -c "import jobspy; print('jobspy localizado en:', jobspy.__file__)"
          echo "--- FIN DE DEPURACIÓN ---"
          
          # 4. Ejecución del bot
          python main.py